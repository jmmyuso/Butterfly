<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efecto Mariposa</title>

    <!-- Favicon / icono del título de la pestaña -->
    <link rel="icon" href="images/maintitle.png" type="image/png">
    <link rel="shortcut icon" href="images/maintitle.png" type="image/png">
    <!-- Soporte para dispositivos Apple -->
    <link rel="apple-touch-icon" href="images/maintitle.png">
    <!-- Opcional: indicar color de la barra de herramientas en móviles -->
    <meta name="theme-color" content="#111111">

    <!-- Aquí conectamos el CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2 id="pageTitle">
        <span class="titleText">LA MARIPOSA PERDIDA</span>
        <span class="subtitleText">El silencio de Pino Montano</span>
    </h2>
    <p class="instrucciones">Usa WASD o Flechas para moverte. Acércate a Yuso, Guille o a los objetos y pulsa 'ESPACIO' para interactuar.</p>
    
    <div id="game-container">
        <!-- Este es el lienzo donde el JS dibujará el juego -->
        <canvas id="juegoCanvas" width="800" height="600"></canvas>
        
        <!-- Esta es la caja de texto, oculta por defecto -->
        <div id="cajaDialogo">
            <h3 id="nombreDialogo"></h3>
            <p id="textoDialogo"></p>
        </div>
    </div>

    <!-- Aquí conectamos TU archivo de JavaScript -->
    <script src="javascript.js"></script>
</body>
</html>
